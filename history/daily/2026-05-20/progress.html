<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeOne OMS — Progress</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0ede8;--white:#fff;--text:#2C2C2A;--muted:#6B6A66;--border:rgba(0,0,0,0.09);--purple:#534AB7;--radius:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);padding:28px 20px;font-size:14px}
.page{max-width:1100px;margin:0 auto}

/* Header */
.header{background:var(--purple);color:#fff;border-radius:16px;padding:20px 28px;margin-bottom:16px;
  display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.header h1{font-size:18px;font-weight:700}
.header p{font-size:12px;opacity:.75;margin-top:2px}
.header-right{text-align:right;font-size:11px;opacity:.75;line-height:1.7;flex-shrink:0}

/* Summary */
.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.s-card{background:var(--white);border-radius:var(--radius);padding:12px 8px;border:1px solid var(--border);text-align:center;cursor:default}
.s-num{font-size:24px;font-weight:700;line-height:1}
.s-label{font-size:11px;color:var(--muted);margin-top:3px}

/* Phase */
.phase{background:var(--white);border-radius:14px;margin-bottom:12px;border:1px solid var(--border);overflow:hidden}
.phase-head{padding:12px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.phase-head:hover{filter:brightness(.97)}
.phase-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.phase-title{font-size:14px;font-weight:700;flex:1}
.phase-sub{font-size:11.5px;opacity:.6;margin-top:1px}
.phase-badge{color:#fff;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700}
.phase-bar{height:3px;background:rgba(0,0,0,0.07)}
.phase-fill{height:100%;transition:width .4s}
.phase-body{padding:0 14px 12px}
.phase-pct{font-size:11px;color:var(--muted);text-align:right;margin-top:6px}
.phase-body.collapsed{display:none}

/* Sprint */
.sprint{margin-top:12px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.sprint-head{padding:9px 14px;background:#faf9f7;font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:8px;cursor:pointer}
.sprint-head:hover{background:#f5f3ef}
.sprint-note{padding:4px 14px 0;font-size:11.5px;color:var(--muted);font-style:italic;background:#faf9f7}
.sprint-toggle{font-size:11px;color:var(--muted);margin-left:auto}

/* Group header row inside table */
.group-sep td{padding:6px 12px;font-size:10.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;background:#f5f4f0;border-top:1px solid var(--border);
  border-bottom:1px solid var(--border)}
.be-sep  td{color:#185FA5;background:#EEF4FB}
.fe-sep  td{color:#0F6E56;background:#EDF7F2}
.e2e-sep td{color:#854F0B;background:#FDF4E7}
.full-panel{border-top:1px solid var(--border)}

/* Task table */
.task-table{width:100%;border-collapse:collapse;font-size:12.5px}
.task-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  color:var(--muted);padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);background:#faf9f7}
.task-table td{padding:6px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.task-table tr:last-child td{border-bottom:none}
.task-table tr:hover td{background:#faf9f7}
.col-id{width:72px;font-size:11px;font-weight:700;color:var(--muted)}
.col-status{width:128px}
.col-assign{width:96px}
.col-date{width:104px}
.col-note{min-width:100px}

/* Controls */
select.status-sel,select.assign-sel{
  border:1px solid var(--border);border-radius:6px;padding:3px 6px;
  font-family:inherit;font-size:11.5px;cursor:pointer;background:var(--white);
  color:var(--text);outline:none;width:100%;max-width:120px}
select.assign-sel{max-width:88px}
select.status-sel:focus,select.assign-sel:focus{border-color:#534AB7}

input.note-inp{border:none;border-bottom:1px dashed var(--border);background:transparent;
  font-family:inherit;font-size:12px;color:var(--text);outline:none;width:100%;padding:2px 0}
input.note-inp:focus{border-bottom-color:#534AB7}
input.note-inp::placeholder{color:#bbb}

input.date-inp{border:1px solid var(--border);border-radius:5px;background:var(--white);
  font-family:inherit;font-size:11.5px;color:var(--text);outline:none;width:100%;padding:2px 5px;cursor:pointer}
input.date-inp:focus{border-color:#534AB7}

/* Add task */
.add-row td{padding:5px 10px}
.btn-add{background:none;border:1px dashed var(--border);border-radius:6px;
  padding:3px 10px;font-size:11.5px;color:var(--muted);cursor:pointer;font-family:inherit}
.btn-add:hover{background:#f0ede8;color:var(--text);border-color:#aaa}

/* Inline add form */
.add-form{display:none;padding:8px 10px;background:#fdfcfb;border-top:1px solid var(--border);gap:6px;flex-wrap:wrap;align-items:flex-end}
.add-form.open{display:flex}
.add-form input,.add-form select{border:1px solid var(--border);border-radius:6px;
  padding:4px 8px;font-family:inherit;font-size:12px;outline:none}
.add-form input:focus,.add-form select:focus{border-color:#534AB7}
.btn-save{background:#534AB7;color:#fff;border:none;border-radius:6px;
  padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.btn-save:hover{background:#3C3489}
.btn-cancel{background:none;border:1px solid var(--border);border-radius:6px;
  padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit;color:var(--muted)}

/* Ad-hoc */
.adhoc-block{background:var(--white);border-radius:14px;margin-bottom:12px;
  border:2px dashed rgba(0,0,0,0.12);overflow:hidden}
.adhoc-head{padding:12px 18px;display:flex;align-items:center;gap:10px;background:#faf9f7;flex-wrap:wrap}
.adhoc-title{font-size:14px;font-weight:700}
.adhoc-sub{font-size:11.5px;color:var(--muted)}
.adhoc-count{margin-left:auto;font-size:12px;font-weight:700;color:var(--muted);
  background:#f0ede8;padding:3px 10px;border-radius:999px}
.adhoc-empty{padding:20px;text-align:center;font-size:13px;color:var(--muted)}

/* Chip */
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;
  border-radius:999px;font-size:11px;font-weight:700}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Saving indicator */
#save-toast{position:fixed;bottom:16px;right:16px;background:#1e293b;color:#fff;
  font-size:12px;padding:6px 14px;border-radius:8px;opacity:0;
  transition:opacity .2s;pointer-events:none;z-index:100}
#save-toast.show{opacity:.9}

/* Footer */
.footer{text-align:center;margin-top:16px;font-size:11px;color:var(--muted)}
.footer code{background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:4px;font-family:monospace}

@media(max-width:700px){
  .summary{grid-template-columns:repeat(3,1fr)}
  .col-dep{display:none}
}
</style>
</head>
<body>
<div class="page" id="app"></div>
<div id="save-toast">💾 Saved</div>

<script>

":"Finance & Documents (Invoice, COD, Billing)","status":"todo","dep":""},{"id":"S4-RPT-1","name":"Reports & Monitor (Dashboard, Export Excel)","status":"todo","dep":""},{"id":"S4-ACT-1","name":"Activity Traceability (Log, Video, Audit)","status":"todo","dep":""}]},{"label":"Integrations & Promotions","tasks":[{"id":"S4-INT-1","name":"Platform Integrations full (Shopee/Lazada/TikTok/LINE)","status":"todo","dep":""},{"id":"S4-PRO-1","name":"Promotion Engine (buy A get X, date range rules)","status":"todo","dep":""}]}]}]}],"adHoc":{"title":"Ad-hoc — งานนอกแผน","note":"งานที่เพิ่มระหว่างทาง ไม่ได้อยู่ใน phase เดิม","tasks":[{"id":"S2-CLEAN-01","name":"ลบ apps/saas-starter ออกจาก FE monorepo","layer":"FE","status":"done","dep":"Wat, 2026-03-29"},{"id":"S2-RBAC-01","name":"UserStatus inactive→disabled fix","layer":"FE","status":"done","dep":"Srattha, 2026-03-31"},{"id":"S2-RBAC-02","name":"usePermission hook","layer":"FE","status":"done","dep":"Wat, 2026-04-02"},{"id":"S2-RBAC-03","name":"User type: skipOtp + defaultMembershipId","layer":"FE","status":"done","dep":"Wat, 2026-04-02"}]}};
const __STATE__  = {"overrides":{"WH-CAP-01":{"assignee":"BENZ"},"WH-CAP-02":{"assignee":"BENZ"},"WH-CAP-03":{"assignee":"BENZ"},"WH-CAP-04":{"assignee":"BENZ","completedAt":"2026-05-21"},"WH-CAP-05":{"assignee":"BENZ"},"WH-CAP-06":{"assignee":"BENZ"},"WH-CAP-07":{"assignee":"BENZ"},"WH-CAP-08":{"assignee":"BENZ"},"PIM-FE-01":{"status":"done"},"PIM-BE-01":{"status":"done"},"PIM-FE-02":{"status":"done"},"PIM-FE-03":{"status":"done"},"PIM-FE-04":{"status":"done"},"PIM-FE-05":{"status":"done"},"PIM-FE-06":{"status":"done"},"PIM-FE-07":{"status":"done"},"PIM-FE-08":{"status":"done"},"PIM-FE-09":{"status":"done"}},"extras":{},"adhoc":[]};
const STATUS_CFG = {"todo":{"emoji":"⬜","label":"Todo","dot":"#ccc","bg":"#f0ede8","fg":"#888"},"progress":{"emoji":"🔵","label":"In Progress","dot":"#3b82f6","bg":"#dbeafe","fg":"#1d4ed8"},"blocked":{"emoji":"🟡","label":"Blocked","dot":"#f59e0b","bg":"#fef9c3","fg":"#92400e"},"done":{"emoji":"✅","label":"Done","dot":"#22c55e","bg":"#dcfce7","fg":"#166534"},"cancelled":{"emoji":"❌","label":"Cancelled","dot":"#ef4444","bg":"#fee2e2","fg":"#991b1b"}};
const ASSIGNEES  = ["WAT","DANG","NUCHIT","BENZ"];
const PHASE_COLORS = {"1":"#534AB7","2":"#0F6E56","3":"#854F0B","4":"#993C1D"};

// ── State ──────────────────────────────────────────────────────────────────
let state = JSON.parse(JSON.stringify(__STATE__));

function getOverride(id) {
  return state.overrides[id] || {};
}

function setOverride(id, field, value) {
  if (!state.overrides[id]) state.overrides[id] = {};
  state.overrides[id][field] = value;
  schedSave();
}

// ── Save ───────────────────────────────────────────────────────────────────
let saveTimer;
function schedSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persistState, 400);
}

function persistState() {
  fetch("/__state", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(state),
  }).then(() => showToast("💾 Saved")).catch(() => showToast("⚠️ Save failed"));
}

function showToast(msg) {
  const t = document.getElementById("save-toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove("show"), 1800);
}

// ── Status helpers ─────────────────────────────────────────────────────────
function statusCfg(key) { return STATUS_CFG[key] || STATUS_CFG.todo; }

function statusSelect(taskId, current) {
  const s = statusCfg(current);
  const opts = Object.entries(STATUS_CFG)
    .map(([k,v]) => `<option value="${k}" ${k===current?"selected":""}>${v.emoji} ${v.label}</option>`)
    .join("");
  return `<select class="status-sel" data-id="${taskId}" data-field="status"
    style="background:${s.bg};color:${s.fg};border-color:${s.dot};font-weight:600">
    ${opts}</select>`;
}

function assignSelect(taskId, current) {
  const COLORS = {WAT:"#EEF4FB",DANG:"#EDF7F2",NUCHIT:"#FDF4E7",BENZ:"#FBF0F8"};
  const bg = current ? (COLORS[current]||"#f0ede8") : "var(--white)";
  const opts = ['<option value="">— </option>',
    ...ASSIGNEES.map(a => `<option value="${a}" ${a===current?"selected":""}>${a}</option>`)
  ].join("");
  return `<select class="assign-sel" data-id="${taskId}" data-field="assignee"
    style="background:${bg}">
    ${opts}</select>`;
}

function noteInput(taskId, current) {
  const val = (current||"").replaceAll('"',"&quot;");
  return `<input class="note-inp" data-id="${taskId}" data-field="note"
    placeholder="หมายเหตุ..." value="${val}">`;
}

function dateInput(taskId, current) {
  return `<input class="date-inp" type="date" data-id="${taskId}" data-field="completedAt"
    value="${current||""}" title="วันที่ทำเสร็จ">`;
}

// ── Stats ──────────────────────────────────────────────────────────────────
function calcStats() {
  const c = { done:0, progress:0, blocked:0, todo:0, cancelled:0 };
  function add(t) {
    const s = (state.overrides[t.id]?.status || t.status || "todo");
    c[s] = (c[s]||0)+1;
  }
  for (const ph of __TASKS__.phases)
    for (const sp of ph.sprints)
      for (const gr of sp.groups) {
        gr.tasks.forEach(add);
        (state.extras[`${sp.title}__${gr.label}`]||[]).forEach(add);
      }
  (__TASKS__.adHoc?.tasks||[]).forEach(add);
  (state.adhoc||[]).forEach(add);
  return c;
}

function phaseStats(ph) {
  let done=0, total=0;
  for (const sp of ph.sprints)
    for (const gr of sp.groups) {
      for (const t of gr.tasks) {
        total++;
        if ((state.overrides[t.id]?.status||t.status)==="done") done++;
      }
      for (const t of (state.extras[`${sp.title}__${gr.label}`]||[])) {
        total++;
        if (t.status==="done") done++;
      }
    }
  return { done, total, pct: total===0 ? 0 : Math.round(done/total*100) };
}

function phaseLabel(ph) {
  let prog=false, blk=false, allDone=true;
  for (const sp of ph.sprints)
    for (const gr of sp.groups)
      for (const t of gr.tasks) {
        const s = state.overrides[t.id]?.status||t.status;
        if (!["done","cancelled"].includes(s)) allDone=false;
        if (s==="progress") prog=true;
        if (s==="blocked")  blk=true;
      }
  if (allDone) return "Completed";
  if (blk)     return "Blocked";
  if (prog)    return "In Progress";
  return "Not Started";
}

// ── Layer badge ────────────────────────────────────────────────────────────
const LAYER_STYLE = {
  BE:   "background:#EEF4FB;color:#185FA5",
  FE:   "background:#EDF7F2;color:#0F6E56",
  Both: "background:#FDF4E7;color:#854F0B",
};
function layerBadge(layer) {
  const style = LAYER_STYLE[layer] || "background:#f0ede8;color:#6B6A66";
  return layer
    ? `<span style="${style};font-size:10px;font-weight:700;padding:1px 6px;
        border-radius:4px;letter-spacing:.04em">${layer}</span> `
    : "";
}

// ── Task row ───────────────────────────────────────────────────────────────
function taskRow(t, withLayerCol=false) {
  const ov   = state.overrides[t.id] || {};
  const stat = ov.status      || t.status      || "todo";
  const asgn = ov.assignee    || t.assignee    || "";
  const note = ov.note        !== undefined ? ov.note : (t.dep||t.note||"");
  const date = ov.completedAt || t.completedAt || "";
  const layerCell = withLayerCol
    ? `<td style="width:56px">${layerBadge(t.layer)}</td>`
    : "";

  return `<tr data-taskid="${t.id}">
    <td class="col-id">${t.id}</td>
    <td>${t.name}</td>
    ${layerCell}
    <td class="col-status">${statusSelect(t.id, stat)}</td>
    <td class="col-assign">${assignSelect(t.id, asgn)}</td>
    <td class="col-date">${dateInput(t.id, date)}</td>
    <td class="col-note">${noteInput(t.id, note)}</td>
  </tr>`;
}

// ── Add task form ──────────────────────────────────────────────────────────
function addTaskForm(context, placeholder="Task name") {
  return `
  <div class="add-form" id="form-${context}" data-context="${context}">
    <input class="new-task-name" placeholder="${placeholder}" style="flex:1;min-width:160px">
    <select class="new-task-status">
      ${Object.entries(STATUS_CFG).map(([k,v])=>
        `<option value="${k}" ${k==="todo"?"selected":""}>${v.emoji} ${v.label}</option>`).join("")}
    </select>
    <select class="new-task-assign" style="width:90px">
      <option value="">Unassigned</option>
      ${ASSIGNEES.map(a=>`<option value="${a}">${a}</option>`).join("")}
    </select>
    <input class="new-task-note" placeholder="หมายเหตุ" style="width:120px">
    <button class="btn-save" onclick="submitAdd('${context}')">+ Add</button>
    <button class="btn-cancel" onclick="cancelAdd('${context}')">Cancel</button>
  </div>`;
}

// ── Group separator row ────────────────────────────────────────────────────
const GROUP_META = {
  BE:  { cls:"be-sep",  icon:"⚙",  label:"BE" },
  FE:  { cls:"fe-sep",  icon:"🌐", label:"FE" },
  E2E: { cls:"e2e-sep", icon:"🧪", label:"E2E Test" },
};

function groupSepRow(gr, key, taskCount, colSpan) {
  const meta = GROUP_META[gr.label] || { cls:"", icon:"·", label:gr.label };
  return `<tr class="group-sep ${meta.cls}">
    <td colspan="${colSpan}">
      ${meta.icon} ${meta.label}
      <span style="font-weight:400;opacity:.6;margin-left:6px">(${taskCount} งาน)</span>
      <button class="btn-add" style="margin-left:auto;float:right"
        onclick="openAdd('${key}')">+ เพิ่มงาน</button>
    </td>
  </tr>`;
}

// ── Unified sprint table ───────────────────────────────────────────────────
function sprintTable(sp, withLayerCol=false) {
  const colSpan = withLayerCol ? 7 : 6;
  const layerTh = withLayerCol ? '<th style="width:48px">Layer</th>' : "";

  // Build tbodies: one per group
  const bodies = sp.groups.map(gr => {
    const key    = `${sp.title}__${gr.label}`;
    const extras = state.extras[key] || [];
    const tasks  = [...gr.tasks, ...extras];
    const sepRow = sp.__summary ? "" : groupSepRow(gr, key, tasks.length, colSpan);
    const rows   = tasks.map(t => taskRow(t, withLayerCol)).join("");
    return `<tbody>${sepRow}${rows}</tbody>`;
  }).join("");

  // Single "+ เพิ่มงาน" at bottom for summary tables
  const addBtn = sp.__summary
    ? `<tbody><tr class="add-row"><td colspan="${colSpan}">
        <button class="btn-add" onclick="openAdd('${sp.title}__Summary')">+ เพิ่มงาน</button>
      </td></tr></tbody>`
    : "";

  // Add-forms (outside table, one per group key)
  const forms = sp.groups.map(gr =>
    addTaskForm(`${sp.title}__${gr.label}`)
  ).join("");

  return `<table class="task-table">
    <thead><tr>
      <th class="col-id">ID</th>
      <th>งาน</th>
      ${layerTh}
      <th class="col-status">Status</th>
      <th class="col-assign">Assignee</th>
      <th class="col-date">วันที่เสร็จ</th>
      <th class="col-note">หมายเหตุ</th>
    </tr></thead>
    ${bodies}
    ${addBtn}
  </table>
  ${forms}`;
}

// ── Render sprint ──────────────────────────────────────────────────────────
function sprintHtml(sp) {
  const noteHtml = sp.note ? `<div class="sprint-note">${sp.note}</div>` : "";
  const id = `sp-${sp.title.replaceAll(/[^a-z0-9]/gi,"-")}`;

  const tableHtml = sp.__summary
    ? `<div class="full-panel">${sprintTable(sp, true)}</div>`
    : `<div class="full-panel">${sprintTable(sp)}</div>`;

  return `<div class="sprint">
    <div class="sprint-head" onclick="toggleSprint('${id}')">
      ${sp.title}
      <span class="sprint-toggle" id="tog-${id}">▼</span>
    </div>
    ${noteHtml}
    <div id="${id}">${tableHtml}</div>
  </div>`;
}

// ── Render phase ───────────────────────────────────────────────────────────
function phaseHtml(ph) {
  const color  = PHASE_COLORS[ph.num] || "#534AB7";
  const stats  = phaseStats(ph);
  const label  = phaseLabel(ph);
  const bodyId = `phase-${ph.num}-body`;

  return `<div class="phase" id="phase-${ph.num}">
  <div class="phase-head" onclick="togglePhase(${ph.num})">
    <div class="phase-num" style="background:${color}">${ph.num}</div>
    <div style="flex:1">
      <div class="phase-title">${ph.title}</div>
      ${ph.subtitle ? `<div class="phase-sub">${ph.subtitle}</div>` : ""}
    </div>
    <span class="phase-badge" style="background:${color}">${label}</span>
  </div>
  <div class="phase-bar">
    <div class="phase-fill" id="pbar-${ph.num}" style="width:${stats.pct}%;background:${color}"></div>
  </div>
  <div class="phase-body" id="${bodyId}">
    ${ph.sprints.map(sp=>sprintHtml(sp)).join("")}
    ${stats.pct>0 ? `<div class="phase-pct">${stats.pct}% complete (${stats.done}/${stats.total})</div>` : ""}
  </div>
</div>`;
}

// ── Render ad-hoc ──────────────────────────────────────────────────────────
function adHocHtml() {
  const ah = __TASKS__.adHoc;
  const mdTasks = ah?.tasks||[];
  const extraTasks = state.adhoc||[];
  const all = [...mdTasks, ...extraTasks];

  const rows = all.length
    ? all.map(t => {
        const ov   = state.overrides[t.id]||{};
        const stat = ov.status      || t.status      || "todo";
        const asgn = ov.assignee    || t.assignee    || "";
        const note = ov.note!==undefined ? ov.note : (t.dep||t.note||"");
        const date = ov.completedAt || t.completedAt || "";
        return `<tr>
          <td class="col-id">${t.id}</td>
          <td>${t.name}</td>
          <td style="width:52px;font-size:10px;font-weight:700;color:var(--muted)">${t.layer||"—"}</td>
          <td class="col-status">${statusSelect(t.id, stat)}</td>
          <td class="col-assign">${assignSelect(t.id, asgn)}</td>
          <td class="col-date">${dateInput(t.id, date)}</td>
          <td class="col-note">${noteInput(t.id, note)}</td>
        </tr>`;
      }).join("")
    : `<tr><td colspan="7"><div class="adhoc-empty">ยังไม่มีงานนอกแผน</div></td></tr>`;

  return `<div class="adhoc-block">
  <div class="adhoc-head">
    <span style="font-size:18px">📌</span>
    <div>
      <div class="adhoc-title">${ah?.title||"Ad-hoc — งานนอกแผน"}</div>
      ${ah?.note ? `<div class="adhoc-sub">${ah.note}</div>` : ""}
    </div>
    <span class="adhoc-count" id="adhoc-count">${all.length} งาน</span>
  </div>
  <table class="task-table" style="margin:0 14px 10px;width:calc(100% - 28px)">
    <thead><tr>
      <th class="col-id">ID</th><th>งาน</th>
      <th style="width:52px">Layer</th>
      <th class="col-status">Status</th>
      <th class="col-assign">Assignee</th>
      <th class="col-date">วันที่เสร็จ</th>
      <th class="col-note">หมายเหตุ</th>
    </tr></thead>
    <tbody id="adhoc-tbody">${rows}</tbody>
  </table>
  <div style="padding:0 14px 10px">
    <button class="btn-add" onclick="openAdd('__adhoc__')">+ เพิ่มงาน Ad-hoc</button>
    ${addTaskForm("__adhoc__","Ad-hoc task name")}
  </div>
</div>`;
}

// ── Summary bar ────────────────────────────────────────────────────────────
function summaryHtml(stats) {
  const items = [
    [stats.done,      "#22c55e","✅ Done"],
    [stats.progress,  "#3b82f6","🔵 In Progress"],
    [stats.blocked,   "#f59e0b","🟡 Blocked"],
    [stats.todo,      "#aaa",   "⬜ Todo"],
    [stats.cancelled, "#ef4444","❌ Cancelled"],
  ];
  return items.map(([n,c,l])=>
    `<div class="s-card"><div class="s-num" style="color:${c}">${n}</div>
     <div class="s-label">${l}</div></div>`).join("");
}

// ── Full render ────────────────────────────────────────────────────────────
function render() {
  const stats = calcStats();
  document.getElementById("app").innerHTML = `
  <div class="header">
    <div>
      <h1>BeOne OMS — Progress Tracker</h1>
      <p>Order Management System · Fulfillment &amp; Warehouse</p>
    </div>
    <div class="header-right">
      อัพเดทล่าสุด<br><strong>21 มิ.ย. 2569 14:14</strong><br>
      <span style="opacity:.6;font-size:10px">แก้ไขใน HTML ได้เลย — auto-save</span>
    </div>
  </div>

  <div class="summary" id="summary">${summaryHtml(stats)}</div>

  ${__TASKS__.phases.map(phaseHtml).join("")}

  ${adHocHtml()}

  <div class="footer">
    แก้ไขที่ <code>tasks/progress.md</code> หรือตรงนี้ → auto-save ·
    รัน <code>node scripts/gen-progress.mjs --serve</code>
  </div>`;

  // Event delegation
  document.addEventListener("change", onFieldChange);
  document.addEventListener("input",  onNoteInput);
}

function onFieldChange(e) {
  const el = e.target;
  if (!el.dataset.id) return;
  setOverride(el.dataset.id, el.dataset.field, el.value);
  if (el.dataset.field === "status") {
    updateSummary();
    if (el.value === "done") {
      const ov = state.overrides[el.dataset.id] || {};
      if (!ov.completedAt) {
        const today = new Date().toISOString().slice(0, 10);
        setOverride(el.dataset.id, "completedAt", today);
        const row = el.closest("tr");
        if (row) {
          const dateEl = row.querySelector(".date-inp");
          if (dateEl) dateEl.value = today;
        }
      }
    }
  }
}

let noteTimer;
function onNoteInput(e) {
  const el = e.target;
  if (!el.classList.contains("note-inp") || !el.dataset.id) return;
  clearTimeout(noteTimer);
  noteTimer = setTimeout(()=>{
    setOverride(el.dataset.id, "note", el.value);
  }, 600);
}

function updateSummary() {
  const stats = calcStats();
  document.getElementById("summary").innerHTML = summaryHtml(stats);
}

// ── Toggle collapse ────────────────────────────────────────────────────────
function togglePhase(num) {
  const body = document.getElementById(`phase-${num}-body`);
  body.classList.toggle("collapsed");
}

function toggleSprint(id) {
  const el = document.getElementById(id);
  const tog = document.getElementById(`tog-${id}`);
  if (!el) return;
  el.style.display = el.style.display==="none" ? "" : "none";
  if (tog) tog.textContent = el.style.display==="none" ? "▶" : "▼";
}

// ── Add task ───────────────────────────────────────────────────────────────
function openAdd(context) {
  document.querySelectorAll(".add-form.open").forEach(f=>{
    if (f.dataset.context!==context) f.classList.remove("open");
  });
  const form = document.getElementById(`form-${context}`);
  if (form) form.classList.toggle("open");
  if (form?.classList.contains("open")) form.querySelector(".new-task-name")?.focus();
}

function cancelAdd(context) {
  const form = document.getElementById(`form-${context}`);
  if (form) { form.classList.remove("open"); resetForm(form); }
}

function resetForm(form) {
  form.querySelectorAll("input").forEach(i=>i.value="");
  form.querySelectorAll("select").forEach(s=>{ if(s.options[0]) s.selectedIndex=0; });
}

function submitAdd(context) {
  const form = document.getElementById(`form-${context}`);
  const name = form.querySelector(".new-task-name")?.value.trim();
  if (!name) { form.querySelector(".new-task-name")?.focus(); return; }

  const status  = form.querySelector(".new-task-status")?.value  || "todo";
  const assignee= form.querySelector(".new-task-assign")?.value  || "";
  const note    = form.querySelector(".new-task-note")?.value    || "";

  if (context==="__adhoc__") {
    const id = `AH-${String((state.adhoc||[]).length+1).padStart(2,"0")}`;
    if (!state.adhoc) state.adhoc=[];
    state.adhoc.push({ id, name, layer:"—", status, assignee, note });
    schedSave();
    render(); // full re-render for ad-hoc (simpler)
    return;
  }

  // Sprint extra task
  const [, groupLabel] = context.split("__");
  const prefix = groupLabel==="BE" ? "BE" : groupLabel==="FE" ? "FE" : "X";
  const count = (state.extras[context]||[]).length+1;
  const id = `${prefix}-EX-${count}`;
  if (!state.extras[context]) state.extras[context]=[];
  state.extras[context].push({ id, name, status, assignee, note });
  schedSave();
  render();
}

// ── Init ───────────────────────────────────────────────────────────────────
render();
</script>



<!-- Time-travel dropdown (REPORT-HISTORY-02) — hidden if /history/index.json fetch fails (file://) -->
<div id="histDropdown" style="position:fixed;top:14px;right:14px;z-index:9999;display:none;font-family:system-ui,sans-serif;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border:1px solid #e6e9f0;border-radius:10px;padding:6px 10px;box-shadow:0 4px 16px rgba(15,23,42,.08);font-size:.78rem;color:#475569">
  <label for="histSel" style="margin-right:6px">📅 View as of</label>
  <select id="histSel" style="font:inherit;color:inherit;background:transparent;border:none;outline:none;cursor:pointer;padding:2px 4px"></select>
</div>
<script>
(async () => {
  // Base-path detection — works on root deploy + sub-path deploy (GitHub Pages) + localhost
  const getBase = () => {
    const m = location.pathname.match(/(.*?)\/history\//);
    if (m) return m[1] + '/';
    return location.pathname.replace(/\/[^/]*$/, '/') || '/';
  };
  const BASE = getBase();
  try {
    const res = await fetch(BASE + 'history/index.json', { cache: 'no-store' });
    if (!res.ok) return;
    const idx = await res.json();
    const dailyList = Array.isArray(idx.daily) ? idx.daily : [];
    if (!dailyList.length) return;
    const sel = document.getElementById('histSel');
    const wrap = document.getElementById('histDropdown');
    const m = location.pathname.match(/\/history\/daily\/([^/]+)\//);
    const current = m ? m[1] : 'today';
    const file = location.pathname.endsWith('executive-summary.html') ? 'executive-summary.html'
               : location.pathname.endsWith('backlog.html') ? 'backlog.html'
               : 'progress.html';
    sel.appendChild(new Option('Today (latest)', 'today'));
    [...dailyList].reverse().forEach(d => {
      const opt = new Option(d, d);
      if (d === current) opt.selected = true;
      sel.appendChild(opt);
    });
    if (current === 'today') sel.value = 'today';
    sel.addEventListener('change', (e) => {
      const v = e.target.value;
      location.href = v === 'today' ? BASE + file : BASE + 'history/daily/' + v + '/' + file;
    });
    wrap.style.display = 'block';
  } catch (_) { /* file:// or missing index → hidden */ }
})();
</script>
</body>
</html>
